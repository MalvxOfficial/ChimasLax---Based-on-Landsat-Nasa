<script>
    const logBox = document.getElementById('debug-log');
    function addLog(msg) {
        const time = new Date().toLocaleTimeString();
        logBox.innerText += `\n[${time}] ${msg}`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    function copyLogs() {
        navigator.clipboard.writeText(logBox.innerText).then(() => {
            const btn = document.querySelector('.btn-copy-log');
            const oldText = btn.innerText;
            btn.innerText = "Copiado!";
            setTimeout(() => btn.innerText = oldText, 2000);
        });
    }

    let planetasDB = [];
    
    // Query simplificada para evitar erros de caractere
    const NASA_API = "https://exoplanetarchive.ipac.caltech.edu/TAP/sync?query=select+top+1000+pl_name,st_teff,disc_year,discoverymethod+from+ps+where+default_flag=1&format=json";
    
    // Usando AllOrigins no modo GET (mais estável para JSON puro)
    const PROXY_URL = `https://api.allorigins.win/get?url=${encodeURIComponent(NASA_API)}`;

    function getPlanetColor(temp) {
        if (!temp) return '#8e8e8e';
        if (temp > 10000) return '#9bb0ff';
        if (temp > 6000) return '#f8f7ff';
        if (temp > 4000) return '#fff2a1';
        return '#ff6060';
    }

    async function fetchNasaData() {
        addLog("Conectando via AllOrigins...");
        try {
            const response = await fetch(PROXY_URL);
            if (!response.ok) throw new Error("Erro no servidor Proxy");
            
            const result = await response.json();
            // AllOrigins retorna o JSON dentro de result.contents
            const data = typeof result.contents === 'string' ? JSON.parse(result.contents) : result.contents;
            
            if (!Array.isArray(data)) throw new Error("Formato de dados inválido");

            planetasDB = data.map(p => ({
                p: p.pl_name,
                c: p.st_teff ? `${p.st_teff}K` : 'Estelar',
                hex: getPlanetColor(p.st_teff),
                d: `Descoberto em ${p.disc_year} via ${p.discoverymethod}.`
            }));

            addLog(`Sucesso! ${planetasDB.length} astros sincronizados.`);
            document.getElementById('mainInput').placeholder = "ChimasAlice...";
        } catch (e) {
            addLog(`ERRO: ${e.message}`);
            addLog("Tentando backup (Direct)...");
            // Tentativa final direta (alguns navegadores mobile permitem se o site estiver no GitHub)
            try {
                const res = await fetch(NASA_API);
                const data = await res.json();
                planetasDB = data.map(p => ({
                    p: p.pl_name, hex: getPlanetColor(p.st_teff), d: `Ano: ${p.disc_year}`, c: `${p.st_teff}K`
                }));
                addLog("Sucesso via Direct Connection!");
                document.getElementById('mainInput').placeholder = "ChimasAlice...";
            } catch(err) {
                addLog("Falha total na sincronização.");
                document.getElementById('mainInput').placeholder = "Erro Crítico.";
            }
        }
    }
    fetchNasaData();

    const input = document.getElementById('mainInput');
    const area = document.getElementById('render-area');
    const btnSort = document.getElementById('toggleSort');
    const overlay = document.getElementById('easter-overlay');
    const timerText = document.getElementById('timer-text');
    
    let modoBusca = 'nome'; 
    let eggActive = false;
    let countdown;

    function closeEgg() { 
        clearInterval(countdown); 
        overlay.style.display = 'none'; 
    }

    function cleanString(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
    }

    function render() {
        const clean = cleanString(input.value);
        
        if (clean === "CHIMASALICE") {
            if (!eggActive) {
                eggActive = true; 
                overlay.style.display = 'flex';
                let s = 10;
                if (countdown) clearInterval(countdown);
                countdown = setInterval(() => {
                    s--;
                    if (s > 3) timerText.innerText = `Redirecionando em ${s}s...`;
                    else if (s > 0) { 
                        timerText.innerText = `Em ${s} segundos será redirecionado para o Github.`; 
                        timerText.style.color = "var(--accent)"; 
                    }
                    else { 
                        clearInterval(countdown);
                        window.location.href = "https://github.com/MalvxOfficial/ChimasLax---Based-on-Landsat-Nasa"; 
                    }
                }, 1000);
            }
        } else { 
            eggActive = false; 
        }

        area.innerHTML = "";
        let historicoIndices = {};

        [...clean].forEach((char, index) => {
            const opcoes = planetasDB.filter(item => {
                const alvo = (modoBusca === 'nome') ? item.p : item.c;
                return cleanString(alvo).startsWith(char);
            });

            if (opcoes.length === 0) return;

            if (!historicoIndices[char]) historicoIndices[char] = 0;
            let astro = opcoes[historicoIndices[char] % opcoes.length];
            historicoIndices[char]++;

            const div = document.createElement('div');
            div.className = 'card';
            div.style.animationDelay = `${index * 0.05}s`;
            div.innerHTML = `
                <div class="esfera" style="--planet-color: ${astro.hex}"></div>
                <div class="nome-astro">${astro.p}</div>
                <div class="frase-desc">${astro.d}</div>
                <div class="cor-tag">Cor/Temp: ${astro.c}</div>
            `;
            area.appendChild(div);
        });
    }

    btnSort.onclick = () => {
        modoBusca = (modoBusca === 'nome') ? 'cor' : 'nome';
        btnSort.innerText = modoBusca === 'nome' ? "Modo: Letra do Planeta" : "Modo: Letra da Cor";
        render();
    };

    input.oninput = render;

    document.getElementById('savePng').onclick = () => {
        if (area.children.length === 0) return;
        document.body.classList.add('printing');
        setTimeout(() => {
            html2canvas(area, { backgroundColor: "#0a0505", scale: 2, width: area.scrollWidth, windowWidth: area.scrollWidth }).then(canvas => {
                const link = document.createElement('a');
                link.download = `atlas-planetario-real.png`;
                link.href = canvas.toDataURL();
                link.click();
                document.body.classList.remove('printing');
            });
        }, 100);
    };
</script>
